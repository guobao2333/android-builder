            local candidate
            for candidate in \
              "${ANDROID_NDK_HOME:-}" \
              "${ANDROID_NDK_ROOT:-}" \
              "$SDK_ROOT/ndk"/* \
              "$HOME/.setup-ndk/$REQUESTED_NDK_VERSION"; do
