  release:
    if: ${{ inputs.upload_release == true }}
    needs: [setup-matrix, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: ${{ needs.setup-matrix.outputs.repository_name }}-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup-matrix.outputs.version_name }}
          name: ${{ needs.setup-matrix.outputs.repository_name }} v${{ needs.setup-matrix.outputs.version_name }}
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
