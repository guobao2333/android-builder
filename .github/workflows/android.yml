name: Android CI
run-name: "${{ inputs.repository || github.repository }} @ ${{ inputs.branch || 'default branch' }} • #${{ github.run_number }}"

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Target Repository（author/repo）'
        required: false
        default: ''

      branch:
        description: 'Target Branch / ref (leave empty to use the target repository default branch)'
        required: false
        default: ''

      module:
        description: 'Target Module(s), comma-separated'
        required: true
        default: 'app'

      build_flavor:
        description: 'Build Flavor(s), comma-separated'
        required: false
        default: ''

      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options: ['debug', 'release', 'aab', 'all']

      build_options:
        description: 'Build Options'
        required: false
        default: ''

      build_test:
        description: 'Full Build Test'
        default: false
        type: boolean

      upload_release:
        description: 'Upload GitHub Release'
        default: false
        type: boolean

      os_version:
        description: 'OS Version'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options: ['ubuntu-latest', 'ubuntu-22.04']

      jdk_version:
        description: 'JDK Version'
        required: true
        default: '21'
        type: choice
        options: ['26', '25', '24', '23', '22', '21', '17', '11', '8']

      ndk_version:
        description: 'NDK Version'
        required: true
        default: 'r27d'
        type: choice
        options: ['r29', 'r28c', 'r27d', 'r26d', 'r25c', 'r24', 'r23c', 'r22b', 'r21e', 'r20b']

permissions:
  contents: read

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.meta.outputs.matrix }}
      repository: ${{ steps.meta.outputs.repository }}
      repository_name: ${{ steps.meta.outputs.repository_name }}
      version_name: ${{ steps.version.outputs.version_name }}
      source_ref: ${{ steps.source.outputs.source_ref }}
      source_sha: ${{ steps.source.outputs.source_sha }}
      source_short_sha: ${{ steps.source.outputs.source_short_sha }}
    steps:
      - name: Checkout target repository at requested ref
        if: ${{ inputs.branch != '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.branch }}
          path: source
          token: ${{ secrets.CHECKOUT_TOKEN || github.token }}
          submodules: recursive

      - name: Checkout target repository at default branch
        if: ${{ inputs.branch == '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository || github.repository }}
          path: source
          token: ${{ secrets.CHECKOUT_TOKEN || github.token }}
          submodules: recursive

      - name: Diagnose checkout failure
        if: ${{ failure() }}
        shell: bash
        env:
          TARGET_REPOSITORY: ${{ inputs.repository || github.repository }}
          TARGET_BRANCH: ${{ inputs.branch }}
        run: |
          echo "::error::Failed to checkout target repository '$TARGET_REPOSITORY'."
          if [ -n "$TARGET_BRANCH" ]; then
            echo "::error::Requested ref '$TARGET_BRANCH' could not be fetched. Check that the branch/tag/SHA exists and that CHECKOUT_TOKEN has read access."
          else
            echo "::error::The target repository default branch could not be fetched. Check that the repository exists and that CHECKOUT_TOKEN has read access."
          fi
          echo "For public repositories, the default github.token is usually enough."
          echo "For private target repositories or private submodules, create a repository secret named CHECKOUT_TOKEN with read access to the target repository and its submodules."

      - name: Resolve checked out source
        id: source
        shell: bash
        working-directory: source
        env:
          REQUESTED_BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail

          SOURCE_SHA="$(git rev-parse HEAD)"
          SOURCE_SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          CURRENT_BRANCH="$(git branch --show-current || true)"
          REMOTE_HEAD="$(git symbolic-ref -q --short refs/remotes/origin/HEAD 2>/dev/null | sed 's#^origin/##' || true)"

          if [ -n "$CURRENT_BRANCH" ]; then
            SOURCE_REF="$CURRENT_BRANCH"
          elif [ -n "$REQUESTED_BRANCH" ]; then
            SOURCE_REF="$REQUESTED_BRANCH"
          elif [ -n "$REMOTE_HEAD" ]; then
            SOURCE_REF="$REMOTE_HEAD"
          else
            SOURCE_REF="detached"
          fi

          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "source_short_sha=$SOURCE_SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Checked out source: ref=$SOURCE_REF sha=$SOURCE_SHA"

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.jdk_version }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ inputs.ndk_version }}
          add-to-path: true
          link-to-sdk: true
          local-cache: true

      - name: Verify NDK toolchain
        shell: bash
        env:
          REQUESTED_NDK_VERSION: ${{ inputs.ndk_version }}
        run: |
          set -euo pipefail

          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          TOOLCHAIN_REL="toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          read_ndk_revision() {
            local dir="$1"
            awk -F'= *' '/^Pkg.Revision/ {gsub(/[[:space:]]/, "", $2); print $2; exit}' "$dir/source.properties"
          }

          has_llvm_strip() {
            local dir="${1:-}"
            [ -n "$dir" ] && [ -x "$dir/$TOOLCHAIN_REL" ]
          }

          find_ndk_dir() {
            local candidate
            for candidate in \
              "${ANDROID_NDK_HOME:-}" \
              "${ANDROID_NDK_ROOT:-}" \
              "$SDK_ROOT/ndk"/* \
              "$HOME/.setup-ndk/$REQUESTED_NDK_VERSION"; do
              [ -n "$candidate" ] || continue
              [ -d "$candidate" ] || continue
              [ -f "$candidate/source.properties" ] || continue
              echo "$candidate"
              return 0
            done
            return 1
          }

          NDK_DIR="$(find_ndk_dir || true)"
          NDK_REVISION=""
          if [ -n "$NDK_DIR" ]; then
            NDK_REVISION="$(read_ndk_revision "$NDK_DIR" || true)"
          fi

          if [ -z "$NDK_REVISION" ]; then
            case "$REQUESTED_NDK_VERSION" in
              r29) NDK_REVISION="29.0.14033849" ;;
              r28c) NDK_REVISION="28.2.13676358" ;;
              r27d) NDK_REVISION="27.3.13750724" ;;
              r26d) NDK_REVISION="26.3.11579264" ;;
              r25c) NDK_REVISION="25.2.9519653" ;;
              r24) NDK_REVISION="24.0.8215888" ;;
              r23c) NDK_REVISION="23.2.8568313" ;;
              r22b) NDK_REVISION="22.1.7171670" ;;
              r21e) NDK_REVISION="21.4.7075529" ;;
              r20b) NDK_REVISION="20.1.5948944" ;;
              *)
                echo "::error::Unable to map NDK alias '$REQUESTED_NDK_VERSION' to a full SDK revision."
                exit 1
                ;;
            esac
          fi

          CANONICAL_NDK_DIR="$SDK_ROOT/ndk/$NDK_REVISION"
          FINAL_NDK_DIR=""

          for candidate in "$CANONICAL_NDK_DIR" "$NDK_DIR" "${ANDROID_NDK_HOME:-}" "${ANDROID_NDK_ROOT:-}"; do
            if has_llvm_strip "$candidate"; then
              FINAL_NDK_DIR="$candidate"
              break
            fi
          done

          if [ -z "$FINAL_NDK_DIR" ]; then
            echo "::warning::NDK '$REQUESTED_NDK_VERSION' resolved to '$NDK_REVISION', but llvm-strip is missing. Reinstalling with sdkmanager."
            SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            if [ ! -x "$SDKMANAGER" ]; then
              SDKMANAGER="$(command -v sdkmanager || true)"
            fi
            if [ -z "$SDKMANAGER" ]; then
              echo "::error::sdkmanager was not found; cannot repair the NDK installation."
              exit 1
            fi

            rm -rf "$CANONICAL_NDK_DIR"

            set +o pipefail
            yes | "$SDKMANAGER" --licenses >/dev/null
            LICENSE_STATUS=${PIPESTATUS[1]}
            yes | "$SDKMANAGER" --install "ndk;$NDK_REVISION"
            INSTALL_STATUS=${PIPESTATUS[1]}
            set -o pipefail

            if [ "$LICENSE_STATUS" -ne 0 ]; then
              echo "::warning::sdkmanager --licenses exited with status $LICENSE_STATUS; continuing because licenses may already be accepted."
            fi
            if [ "$INSTALL_STATUS" -ne 0 ]; then
              echo "::error::sdkmanager failed to install ndk;$NDK_REVISION with status $INSTALL_STATUS."
              exit "$INSTALL_STATUS"
            fi

            FINAL_NDK_DIR="$CANONICAL_NDK_DIR"
          fi

          if ! has_llvm_strip "$FINAL_NDK_DIR"; then
            echo "::error::NDK installation is incomplete: missing $FINAL_NDK_DIR/$TOOLCHAIN_REL"
            echo "Detected NDK directory contents:"
            find "$FINAL_NDK_DIR" -maxdepth 4 -type f -o -type l 2>/dev/null | sort | head -200 || true
            exit 1
          fi

          echo "ANDROID_NDK_HOME=$FINAL_NDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$FINAL_NDK_DIR" >> "$GITHUB_ENV"
          echo "$FINAL_NDK_DIR" >> "$GITHUB_PATH"
          echo "NDK verified: $REQUESTED_NDK_VERSION -> $NDK_REVISION ($FINAL_NDK_DIR)"

      - name: Resolve version name
        id: version
        shell: bash
        working-directory: source
        run: |
          set -euo pipefail

          VERSION_NAME=""
          if [ -f gradle.properties ]; then
            VERSION_NAME="$(grep -E '^[[:space:]]*(versionName|VERSION_NAME|version)[[:space:]]*=' gradle.properties | head -n1 | cut -d= -f2- | tr -d '[:space:]' || true)"
          fi

          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="${GITHUB_RUN_NUMBER}"
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION_NAME"

      - name: Prepare build metadata and matrix
        id: meta
        shell: bash
        working-directory: source
        env:
          INPUT_REPOSITORY: ${{ inputs.repository }}
          INPUT_MODULE: ${{ inputs.module }}
          INPUT_BUILD_FLAVOR: ${{ inputs.build_flavor }}
          INPUT_BUILD_TYPE: ${{ inputs.build_type }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          import subprocess
          import sys
          from datetime import datetime, timezone

          def canonical_module(raw: str) -> str:
              raw = raw.strip()
              if not raw:
                  return ""
              if not raw.startswith(":"):
                  raw = ":" + raw
              return re.sub(r":+", ":", raw)

          def module_dir(module: str) -> str:
              return module.lstrip(":").replace(":", "/")

          def normalize_key(text: str) -> str:
              return re.sub(r"[^a-z0-9]+", "", text.lower())

          def slug(text: str, default: str) -> str:
              value = re.sub(r"[^a-z0-9]+", "-", text.lower()).strip("-")
              return value or default

          def parse_csv(value: str) -> list[str]:
              return [item.strip() for item in value.split(",") if item.strip()] if value else []

          def run_gradle(*args: str) -> str:
              cmd = ["./gradlew", "--no-daemon", "--console=plain", *args]
              proc = subprocess.run(
                  cmd,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
                  check=False,
              )
              if proc.returncode != 0:
                  print(proc.stdout, file=sys.stderr)
                  sys.exit(proc.returncode)
              return proc.stdout

          def available_modules() -> list[str]:
              out = run_gradle("projects")
              modules: list[str] = []
              for line in out.splitlines():
                  match = re.search(r"Project '(:[^']+)'", line)
                  if not match:
                      continue
                  module = canonical_module(match.group(1))
                  if module != ":" and module not in modules:
                      modules.append(module)
              return modules

          task_cache: dict[str, list[str]] = {}

          def collect_tasks(module: str) -> list[str]:
              module = canonical_module(module)
              if module in task_cache:
                  return task_cache[module]

              out = run_gradle(f"{module}:tasks", "--all")
              tasks: list[str] = []
              task_re = re.compile(r"^\s*((?:assemble|bundle|install)[A-Za-z0-9]+)\b")
              for line in out.splitlines():
                  match = task_re.match(line)
                  if not match:
                      continue
                  task = match.group(1)
                  if task not in tasks:
                      tasks.append(task)

              task_cache[module] = tasks
              return tasks

          def is_installable_app(tasks: list[str]) -> bool:
              return any(task.startswith("install") for task in tasks) or any(
                  task.startswith("bundle") and not task.endswith("Aar") for task in tasks
              )

          def variant_from_task(task: str) -> tuple[str, str, str] | None:
              match = re.match(r"^(assemble|bundle)([A-Z][A-Za-z0-9]*)?(Debug|Release)$", task)
              if not match:
                  return None
              prefix, flavor, suffix = match.groups()
              build_type = suffix.lower()
              artifact_type = "aab" if prefix == "bundle" else "apk"
              if artifact_type == "aab" and build_type != "release":
                  return None
              return flavor or "", build_type, artifact_type

          def matches_requested_build(build_type_input: str, build_type: str, artifact_type: str) -> bool:
              if build_type_input == "all":
                  return True
              if build_type_input == "aab":
                  return build_type == "release" and artifact_type == "aab"
              return build_type == build_type_input and artifact_type == "apk"

          def format_error(message: str) -> None:
              print(f"::error::{message}", file=sys.stderr)
              sys.exit(1)

          repository = os.environ.get("INPUT_REPOSITORY", "").strip() or os.environ.get("GITHUB_REPOSITORY", "").strip()
          repo_name = repository.rsplit("/", 1)[-1]
          module_input = os.environ.get("INPUT_MODULE", "").strip()
          build_flavor_input = os.environ.get("INPUT_BUILD_FLAVOR", "").strip()
          build_type_input = os.environ.get("INPUT_BUILD_TYPE", "").strip()
          date_long = os.environ.get("DATE_LONG", "").strip() or datetime.now(timezone.utc).strftime("%Y%m%d-%H%M%S")

          if build_type_input not in {"debug", "release", "aab", "all"}:
              format_error(f"Unsupported build_type: {build_type_input}")

          requested_flavors = [normalize_key(item) for item in parse_csv(build_flavor_input)]
          all_modules = available_modules()
          if not all_modules:
              format_error("No Gradle subprojects were found. Ensure the target repository contains an Android project.")

          if module_input:
              candidate_modules = []
              unknown_modules = []
              for item in parse_csv(module_input):
                  module = canonical_module(item)
                  if module not in all_modules:
                      unknown_modules.append(module or item)
                  else:
                      candidate_modules.append(module)
              if unknown_modules:
                  format_error(
                      "Unknown module(s): " + ", ".join(sorted(set(unknown_modules)))
                      + ". Available subprojects: " + ", ".join(all_modules)
                  )
          else:
              candidate_modules = [module for module in all_modules if is_installable_app(collect_tasks(module))]

          if not candidate_modules:
              if module_input:
                  format_error(
                      "No valid modules remain after filtering. Check the module input and the target branch."
                  )
              format_error(
                  "No installable Android application modules were found. Specify the module input explicitly if the project layout is unusual."
              )

          matrix_entries: list[dict[str, str]] = []
          module_errors: list[str] = []
          seen: set[tuple[str, str, str, str]] = set()

          for module in candidate_modules:
              tasks = collect_tasks(module)
              if not is_installable_app(tasks):
                  if module_input:
                      format_error(
                          f"Module '{module}' does not expose installable Android tasks. Expected app-style bundle/install tasks, but only library-style tasks were found."
                      )
                  continue

              module_dir_value = module_dir(module)
              module_safe = slug(module_dir_value.replace("/", "-"), "module")

              module_items: list[dict[str, str]] = []
              for task in tasks:
                  parsed = variant_from_task(task)
                  if not parsed:
                      continue
                  flavor, build_type, artifact_type = parsed

                  if not matches_requested_build(build_type_input, build_type, artifact_type):
                      continue

                  if requested_flavors:
                      if not flavor:
                          continue
                      flavor_key = normalize_key(flavor)
                      if not any(token in flavor_key for token in requested_flavors):
                          continue

                  flavor_safe = slug(flavor, "") if flavor else ""
                  variant_label = "aab" if artifact_type == "aab" else build_type
                  artifact_name_parts = [repo_name, module_safe, flavor_safe, variant_label, date_long]
                  artifact_name = "-".join(part for part in artifact_name_parts if part)

                  key = (module, flavor, build_type, artifact_type)
                  if key in seen:
                      continue
                  seen.add(key)

                  gradle_task = task

                  module_items.append(
                      {
                          "module": module,
                          "module_dir": module_dir_value,
                          "module_safe": module_safe,
                          "flavor": flavor,
                          "flavor_safe": flavor_safe,
                          "build_type": build_type,
                          "artifact_type": artifact_type,
                          "variant_label": variant_label,
                          "gradle_task": gradle_task,
                          "artifact_name": artifact_name,
                      }
                  )

              if not module_items:
                  detail = []
                  if build_type_input != "all":
                      detail.append(f"build_type='{build_type_input}'")
                  if build_flavor_input:
                      detail.append(f"build_flavor='{build_flavor_input}'")
                  filter_desc = " and ".join(detail) if detail else "current filters"
                  message = (
                      f"Module '{module}' has no build variants matching {filter_desc}. "
                      f"Available tasks: {', '.join(tasks) if tasks else 'none'}"
                  )
                  if module_input:
                      format_error(message)
                  module_errors.append(message)
                  continue

              matrix_entries.extend(module_items)

          if not matrix_entries:
              if module_errors:
                  format_error("; ".join(module_errors))
              format_error("No build variants matched the current filters.")

          matrix = {"include": matrix_entries}
          print(f"repository={repository}")
          print(f"repository_name={repo_name}")
          print(f"matrix={json.dumps(matrix, ensure_ascii=False)}")
          PY

      - name: Print resolved workflow inputs
        shell: bash
        env:
          RESOLVED_REPOSITORY: ${{ steps.meta.outputs.repository }}
          RESOLVED_REPOSITORY_NAME: ${{ steps.meta.outputs.repository_name }}
          REQUESTED_BRANCH: ${{ inputs.branch }}
          RESOLVED_BRANCH: ${{ steps.source.outputs.source_ref }}
          RESOLVED_SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          RESOLVED_SOURCE_SHORT_SHA: ${{ steps.source.outputs.source_short_sha }}
          RESOLVED_OS_VERSION: ${{ inputs.os_version }}
          RESOLVED_JDK_VERSION: ${{ inputs.jdk_version }}
          RESOLVED_NDK_VERSION: ${{ inputs.ndk_version }}
          RESOLVED_BUILD_TEST: ${{ inputs.build_test }}
          RESOLVED_UPLOAD_RELEASE: ${{ inputs.upload_release }}
          RESOLVED_BUILD_OPTIONS: ${{ inputs.build_options }}
          REQUESTED_MODULE: ${{ inputs.module }}
          REQUESTED_BUILD_FLAVOR: ${{ inputs.build_flavor }}
          REQUESTED_BUILD_TYPE: ${{ inputs.build_type }}
          RESOLVED_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          RESOLVED_MATRIX: ${{ steps.meta.outputs.matrix }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import sys

          def value(name: str, default: str = "") -> str:
              return os.environ.get(name, default)

          def md_escape(text: str) -> str:
              return text.replace("|", "\\|").replace("\n", "<br>")

          def add_input_row(rows: list[str], key: str, val: str) -> None:
              rows.append(f"| `{key}` | `{md_escape(val)}` |")

          matrix_json = value("RESOLVED_MATRIX", '{"include": []}')
          try:
              entries = json.loads(matrix_json).get("include", [])
          except json.JSONDecodeError as exc:
              print(f"::error::Unable to parse resolved matrix: {exc}", file=sys.stderr)
              raise

          rows = [
              "### Resolved manual workflow inputs",
              "",
              "| Input | Final value used |",
              "| --- | --- |",
          ]
          add_input_row(rows, "repository", value("RESOLVED_REPOSITORY"))
          add_input_row(rows, "repository_name", value("RESOLVED_REPOSITORY_NAME"))
          add_input_row(rows, "branch_input", value("REQUESTED_BRANCH") or "(empty; target default branch)")
          add_input_row(rows, "resolved_branch_or_ref", value("RESOLVED_BRANCH"))
          add_input_row(rows, "source_sha", value("RESOLVED_SOURCE_SHA"))
          add_input_row(rows, "module", value("REQUESTED_MODULE"))
          add_input_row(rows, "build_flavor", value("REQUESTED_BUILD_FLAVOR"))
          add_input_row(rows, "build_type", value("REQUESTED_BUILD_TYPE"))
          add_input_row(rows, "build_options", value("RESOLVED_BUILD_OPTIONS"))
          add_input_row(rows, "build_test", value("RESOLVED_BUILD_TEST"))
          add_input_row(rows, "upload_release", value("RESOLVED_UPLOAD_RELEASE"))
          add_input_row(rows, "os_version", value("RESOLVED_OS_VERSION"))
          add_input_row(rows, "jdk_version", value("RESOLVED_JDK_VERSION"))
          add_input_row(rows, "ndk_version", value("RESOLVED_NDK_VERSION"))
          add_input_row(rows, "version_name", value("RESOLVED_VERSION_NAME"))
          add_input_row(rows, "checkout_submodules", "recursive")

          rows.extend([
              "",
              "### Resolved build matrix",
              "",
              "| # | Module | Flavor | Build type | Artifact | Gradle task | Artifact name |",
              "| ---: | --- | --- | --- | --- | --- | --- |",
          ])

          for index, item in enumerate(entries, start=1):
              rows.append(
                  "| {index} | `{module}` | `{flavor}` | `{build_type}` | `{artifact_type}` | `{task}` | `{artifact_name}` |".format(
                      index=index,
                      module=md_escape(item.get("module", "")),
                      flavor=md_escape(item.get("flavor") or "-"),
                      build_type=md_escape(item.get("build_type", "")),
                      artifact_type=md_escape(item.get("artifact_type", "")),
                      task=md_escape(item.get("gradle_task", "")),
                      artifact_name=md_escape(item.get("artifact_name", "")),
                  )
              )

          summary = "\n".join(rows) + "\n"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write(summary)

          print("Resolved manual workflow inputs:")
          print(f"  repository: {value('RESOLVED_REPOSITORY')}")
          print(f"  branch input: {value('REQUESTED_BRANCH') or '(empty; target default branch)'}")
          print(f"  resolved branch/ref: {value('RESOLVED_BRANCH')}")
          print(f"  source sha: {value('RESOLVED_SOURCE_SHA')}")
          print(f"  module input: {value('REQUESTED_MODULE')}")
          print(f"  build_flavor input: {value('REQUESTED_BUILD_FLAVOR')}")
          print(f"  build_type input: {value('REQUESTED_BUILD_TYPE')}")
          print(f"  build_options: {value('RESOLVED_BUILD_OPTIONS')}")
          print(f"  build_test: {value('RESOLVED_BUILD_TEST')}")
          print(f"  upload_release: {value('RESOLVED_UPLOAD_RELEASE')}")
          print(f"  os_version: {value('RESOLVED_OS_VERSION')}")
          print(f"  jdk_version: {value('RESOLVED_JDK_VERSION')}")
          print(f"  ndk_version: {value('RESOLVED_NDK_VERSION')}")
          print(f"  version_name: {value('RESOLVED_VERSION_NAME')}")
          print("Resolved build matrix:")
          for index, item in enumerate(entries, start=1):
              print(
                  f"  {index}. module={item.get('module', '')} "
                  f"flavor={item.get('flavor') or '-'} "
                  f"build_type={item.get('build_type', '')} "
                  f"artifact_type={item.get('artifact_type', '')} "
                  f"gradle_task={item.get('gradle_task', '')} "
                  f"artifact_name={item.get('artifact_name', '')}"
              )
          PY

  test:
    if: ${{ inputs.build_test }}
    needs: setup-matrix
    runs-on: ${{ inputs.os_version }}
    steps:
      - name: Checkout resolved target source
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.setup-matrix.outputs.repository }}
          ref: ${{ needs.setup-matrix.outputs.source_sha }}
          token: ${{ secrets.CHECKOUT_TOKEN || github.token }}
          submodules: recursive

      - name: Diagnose checkout failure
        if: ${{ failure() }}
        shell: bash
        env:
          TARGET_REPOSITORY: ${{ needs.setup-matrix.outputs.repository }}
          SOURCE_REF: ${{ needs.setup-matrix.outputs.source_ref }}
          SOURCE_SHA: ${{ needs.setup-matrix.outputs.source_sha }}
        run: |
          echo "::error::Failed to checkout '$TARGET_REPOSITORY' at '$SOURCE_REF' ($SOURCE_SHA)."
          echo "Check that CHECKOUT_TOKEN has read access to the target repository and its recursive submodules."

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.jdk_version }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ inputs.ndk_version }}
          add-to-path: true
          link-to-sdk: true
          local-cache: true

      - name: Verify NDK toolchain
        shell: bash
        env:
          REQUESTED_NDK_VERSION: ${{ inputs.ndk_version }}
        run: |
          set -euo pipefail

          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          TOOLCHAIN_REL="toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          read_ndk_revision() {
            local dir="$1"
            awk -F'= *' '/^Pkg.Revision/ {gsub(/[[:space:]]/, "", $2); print $2; exit}' "$dir/source.properties"
          }

          has_llvm_strip() {
            local dir="${1:-}"
            [ -n "$dir" ] && [ -x "$dir/$TOOLCHAIN_REL" ]
          }

          find_ndk_dir() {
            local candidate
            for candidate in \
              "${ANDROID_NDK_HOME:-}" \
              "${ANDROID_NDK_ROOT:-}" \
              "$SDK_ROOT/ndk"/* \
              "$HOME/.setup-ndk/$REQUESTED_NDK_VERSION"; do
              [ -n "$candidate" ] || continue
              [ -d "$candidate" ] || continue
              [ -f "$candidate/source.properties" ] || continue
              echo "$candidate"
              return 0
            done
            return 1
          }

          NDK_DIR="$(find_ndk_dir || true)"
          NDK_REVISION=""
          if [ -n "$NDK_DIR" ]; then
            NDK_REVISION="$(read_ndk_revision "$NDK_DIR" || true)"
          fi

          if [ -z "$NDK_REVISION" ]; then
            case "$REQUESTED_NDK_VERSION" in
              r29) NDK_REVISION="29.0.14033849" ;;
              r28c) NDK_REVISION="28.2.13676358" ;;
              r27d) NDK_REVISION="27.3.13750724" ;;
              r26d) NDK_REVISION="26.3.11579264" ;;
              r25c) NDK_REVISION="25.2.9519653" ;;
              r24) NDK_REVISION="24.0.8215888" ;;
              r23c) NDK_REVISION="23.2.8568313" ;;
              r22b) NDK_REVISION="22.1.7171670" ;;
              r21e) NDK_REVISION="21.4.7075529" ;;
              r20b) NDK_REVISION="20.1.5948944" ;;
              *)
                echo "::error::Unable to map NDK alias '$REQUESTED_NDK_VERSION' to a full SDK revision."
                exit 1
                ;;
            esac
          fi

          CANONICAL_NDK_DIR="$SDK_ROOT/ndk/$NDK_REVISION"
          FINAL_NDK_DIR=""

          for candidate in "$CANONICAL_NDK_DIR" "$NDK_DIR" "${ANDROID_NDK_HOME:-}" "${ANDROID_NDK_ROOT:-}"; do
            if has_llvm_strip "$candidate"; then
              FINAL_NDK_DIR="$candidate"
              break
            fi
          done

          if [ -z "$FINAL_NDK_DIR" ]; then
            echo "::warning::NDK '$REQUESTED_NDK_VERSION' resolved to '$NDK_REVISION', but llvm-strip is missing. Reinstalling with sdkmanager."
            SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            if [ ! -x "$SDKMANAGER" ]; then
              SDKMANAGER="$(command -v sdkmanager || true)"
            fi
            if [ -z "$SDKMANAGER" ]; then
              echo "::error::sdkmanager was not found; cannot repair the NDK installation."
              exit 1
            fi

            rm -rf "$CANONICAL_NDK_DIR"

            set +o pipefail
            yes | "$SDKMANAGER" --licenses >/dev/null
            LICENSE_STATUS=${PIPESTATUS[1]}
            yes | "$SDKMANAGER" --install "ndk;$NDK_REVISION"
            INSTALL_STATUS=${PIPESTATUS[1]}
            set -o pipefail

            if [ "$LICENSE_STATUS" -ne 0 ]; then
              echo "::warning::sdkmanager --licenses exited with status $LICENSE_STATUS; continuing because licenses may already be accepted."
            fi
            if [ "$INSTALL_STATUS" -ne 0 ]; then
              echo "::error::sdkmanager failed to install ndk;$NDK_REVISION with status $INSTALL_STATUS."
              exit "$INSTALL_STATUS"
            fi

            FINAL_NDK_DIR="$CANONICAL_NDK_DIR"
          fi

          if ! has_llvm_strip "$FINAL_NDK_DIR"; then
            echo "::error::NDK installation is incomplete: missing $FINAL_NDK_DIR/$TOOLCHAIN_REL"
            echo "Detected NDK directory contents:"
            find "$FINAL_NDK_DIR" -maxdepth 4 -type f -o -type l 2>/dev/null | sort | head -200 || true
            exit 1
          fi

          echo "ANDROID_NDK_HOME=$FINAL_NDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$FINAL_NDK_DIR" >> "$GITHUB_ENV"
          echo "$FINAL_NDK_DIR" >> "$GITHUB_PATH"
          echo "NDK verified: $REQUESTED_NDK_VERSION -> $NDK_REVISION ($FINAL_NDK_DIR)"

      - name: Run gradle tests
        shell: bash
        env:
          BUILD_OPTIONS: ${{ inputs.build_options }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          EXTRA_GRADLE_ARGS=()
          if [ -n "$BUILD_OPTIONS" ]; then
            read -r -a EXTRA_GRADLE_ARGS <<< "$BUILD_OPTIONS"
          fi
          ./gradlew build --no-daemon --stacktrace "${EXTRA_GRADLE_ARGS[@]}"

  build:
    needs: setup-matrix
    runs-on: ${{ inputs.os_version }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Checkout resolved target source
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.setup-matrix.outputs.repository }}
          ref: ${{ needs.setup-matrix.outputs.source_sha }}
